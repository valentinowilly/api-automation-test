get:
  summary: Get declined RFQ items
  deprecated: false
  description: |
    Retrieve RFQ items declined by vendor (status_vendor = 2).
  operationId: getDeclinedItems
  tags:
    - CS Operations
  parameters:
    - name: rfq_number
      in: path
      description: RFQ number identifier
      required: true
      example: RFQ0000597
      schema:
        type: string
        pattern: ^RFQ[0-9BKG]{8,9}$
        example: RFQ20240001
    - name: vendor_batch
      in: path
      description: |
        Vendor batch number (1 or 2 for dual-vendor RFQs).

        **Important**: In dual-vendor scenarios:
        - Batch 1: Primary vendor
        - Batch 2: Secondary vendor (only processed if Batch 1 declined)
      required: true
      example: 2
      schema:
        type: integer
        minimum: 1
        maximum: 2
        example: 1
  responses:
    '200':
      description: Declined items retrieved successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: object
                properties:
                  header:
                    type: object
                    properties:
                      rfq_number:
                        type: string
                      pr_number:
                        type: string
                      purchasing_group:
                        type: string
                      pr_creator_name:
                        type: string
                      pr_creator_email:
                        type: string
                      pr_release_date:
                        type: string
                      sla_days:
                        type: integer
                      vendor_code:
                        type: string
                      vendor_name:
                        type: string
                      milestone:
                        type: string
                      sub_milestone:
                        type: string
                      quotation_number:
                        type: string
                      quotation_date:
                        type: string
                      document:
                        type: string
                    required:
                      - rfq_number
                      - pr_number
                      - purchasing_group
                      - pr_creator_name
                      - pr_creator_email
                      - pr_release_date
                      - sla_days
                      - vendor_code
                      - vendor_name
                      - milestone
                      - sub_milestone
                      - quotation_number
                      - quotation_date
                      - document
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        request_quantity:
                          type: integer
                        request_price:
                          type: string
                        request_delivery_date:
                          type: string
                        location:
                          type: string
                        rfq_number:
                          type: string
                        item_code:
                          type: string
                        vendor_code:
                          type: string
                        offer_vendor_delivery_date:
                          type: string
                          nullable: true
                        offer_vendor_price:
                          type: number
                          nullable: true
                        vendor_description:
                          type: string
                          nullable: true
                        reject_reason:
                          type: string
                        vendor_reject_reason:
                          type: string
                        status_dic:
                          type: integer
                          nullable: true
                        status_milestone:
                          type: integer
                        offer_vendor_specification:
