get:
  summary: Get RFQ items for DIC
  deprecated: false
  description: |
    Retrieve RFQ items for DIC confirmation via email token.

    Returns items with vendor quotation data for DIC review.
  operationId: getDICRFQItems
  tags:
    - DIC Operations
  parameters:
    - name: token
      in: path
      description: JWT token for email-based authentication
      required: true
      example: >-
        eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyZnFfbnVtYmVyIjoiUkZRMDAwMDYyNCIsInZlbmRvcl9iYXRjaCI6MiwiaWF0IjoxNzY5NjUzNjYyLCJleHAiOjE3NzAyNTg0NjJ9._ZyRITVAuUSg0kIPquY0hExdJVDvGbIpN9UmkSEhyV4
      schema:
        type: string
        format: jwt
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
  responses:
