post:
  summary: Manually resend RFQ to vendor
  deprecated: false
  description: >
    Resend RFQ email to vendor with new token.


    Requires authentication. Used by CS to manually resend if vendor hasn't
    confirmed receipt.


    **Dual-Vendor Validation**: For dual-vendor RFQs, validates per-item logic
    before resending.
  operationId: resendRFQRequest
  tags:
    - Email Notifications
  parameters:
    - name: rfq_number
      in: path
      description: RFQ number identifier
      required: true
      example: ''
      schema:
        type: string
        pattern: ^RFQ[0-9BKG]{8,9}$
        example: RFQ20240001
    - name: vendor_batch
      in: path
      description: |
        Vendor batch number (1 or 2 for dual-vendor RFQs).

        **Important**: In dual-vendor scenarios:
        - Batch 1: Primary vendor
        - Batch 2: Secondary vendor (only processed if Batch 1 declined)
      required: true
      example: 0
      schema:
        type: integer
        minimum: 1
        maximum: 2
        example: 1
    - name: vendor_code
      in: path
      description: Vendor code identifier
      required: true
      example: ''
      schema:
        type: string
        maxLength: 50
        example: V0001234
  responses:
    '200':
      description: RFQ resent successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: object
                properties:
                  sent:
                    type: boolean
                  new_token:
                    type: string
      headers: {}
  security:
    - bearer: []
