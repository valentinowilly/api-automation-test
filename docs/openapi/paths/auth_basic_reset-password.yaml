post:
  summary: Reset password
  deprecated: false
  description: |
    Complete password reset with valid token and new password.

    Token is obtained from the password reset email.
  operationId: resetPasswordBasic
  tags:
    - Authentication/Reset Password new
    - Authentication
  parameters:
    - name: token
      in: query
      description: Password reset token from email
      required: true
      example: ''
      schema:
        type: string
  requestBody:
    content:
      application/json:
        schema:
          type: object
          required:
            - newPassword
          properties:
            newPassword:
              type: string
              format: password
              minLength: 8
              description: New password for the account
        example:
          newPassword: newpassword123
  responses:
    '200':
      description: Password reset successful
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Password Anda berhasil direset. Silakan login dengan password baru.
              data:
                type: "null"
                example: null
          example:
            message: Password Anda berhasil direset. Silakan login dengan password baru.
            data: null
      headers: {}
    '400':
      description: Invalid token or password requirements not met
      content:
        application/json:
          schema:
            type: object
            properties: {}
          example:
            message: Password must be at least 8 characters
            data: error data
      headers: {}
  security: []
get:
  summary: Reset password Verif Token
  deprecated: false
  description: |
    Complete password reset with valid token and new password.

    Token is obtained from the password reset email.
  operationId: verifyResetPassword
  tags:
    - Authentication/Reset Password new
    - Authentication
  parameters:
    - name: token
      in: query
      description: Password reset token from email
      required: true
      example: ''
      schema:
        type: string
  responses:
    '200':
      description: Token is valid
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: Token valid.
              data:
                type: "null"
                example: null
          example:
            message: Token valid.
            data: null
      headers: {}
    '400':
      description: Invalid token or token expired
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: object
          example:
            message: Invalid or expired token
            data: {}
      headers: {}
  security: []
