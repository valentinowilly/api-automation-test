                    type: object
                    properties:
                      totalItems:
                        type: integer
                      totalPages:
                        type: integer
                      currentPage:
                        type: integer
                      itemsPerPage:
                        type: integer
                    required:
                      - totalItems
                      - totalPages
                      - currentPage
                      - itemsPerPage
                required:
                  - summary
                  - data
                  - pagination
            required:
              - message
              - data
