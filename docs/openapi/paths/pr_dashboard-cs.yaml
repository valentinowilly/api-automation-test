get:
  summary: Dashboard CS
  deprecated: false
  description: ''
  tags:
    - Dashboard
  parameters:
    - name: page
      in: query
      description: ''
      required: false
      example: '1'
      schema:
        type: string
    - name: limit
      in: query
      description: ''
      required: false
      example: '10'
      schema:
        type: string
    - name: status_filter
      in: query
      description: ''
      required: false
      example: Waiting Vendor
      schema:
        type: string
        enum:
          - Waiting Vendor
          - Waiting User
          - Waiting CS
          - Manual Sourcing
          - Waiting Procurement
          - PO Published
          - Not Awarded
    - name: action_filter
      in: query
      description: ''
      required: false
      example: Surrogate
      schema:
        type: string
        enum:
          - Resend RFQ / Manual Sourcing
          - '>OE'
          - Surrogate
    - name: sort
      in: query
      description: ''
      required: false
      example: rfq_number
      schema:
        type: string
        enum:
          - rfq_number
          - pr_number
          - sla
          - status
          - action
          - pr_release_date
    - name: order
      in: query
      description: ''
      required: false
      example: asc
      schema:
        type: string
        enum:
          - asc
          - desc
    - name: search
      in: query
      description: ''
      required: false
      schema:
        type: string
    - name: date_to
      in: query
      description: ''
      required: false
      example: '2026-02-10'
      schema:
        type: string
    - name: date_from
      in: query
      description: ''
      required: false
      example: '2026-02-10'
      schema:
        type: string
  responses:
    '200':
      description: ''
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: object
                properties:
                  summary:
                    type: object
                    properties:
                      total_rfq:
                        type: integer
                      total_items:
                        type: integer
                      need_action:
                        type: integer
                      waiting:
                        type: integer
                      po_published:
                        type: integer
                      manual_sourcing:
                        type: integer
                    required:
                      - total_rfq
                      - total_items
                      - need_action
                      - waiting
                      - po_published
                      - manual_sourcing
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        rfq_number:
                          type: string
                        pr_number:
                          type: string
                        pr_release_date:
                          type: string
                        server_groups:
                          type: string
                        SLA:
                          type: integer
                        vendor:
                          type: string
                        vendor_code:
                          type: string
                        vendor_batch:
                          type: integer
                        cs_name:
                          type: string
                        cs_email:
                          type: string
                        status_vendor:
                          type: string
                        status_dic:
                          type: string
                        milestone_id:
                          type: integer
                        status_milestone:
                          type: string
                        status_submilestone:
                          type: string
                        status:
                          type: string
                        status_group:
                          type: string
                        action:
                          type: string
                          nullable: true
                        items:
                          type: array
                          items:
                            type: object
                            properties:
                              quantity:
                                type: integer
                              item_code:
                                type: string
                              item_text:
                                type: string
                            required:
                              - quantity
                              - item_code
                              - item_text
                      required:
                        - rfq_number
                        - pr_number
                        - pr_release_date
                        - server_groups
                        - SLA
                        - vendor
                        - vendor_code
                        - vendor_batch
                        - cs_name
                        - cs_email
                        - status_vendor
                        - status_dic
                        - milestone_id
                        - status_milestone
                        - status_submilestone
                        - status
                        - status_group
                        - action
                        - items
