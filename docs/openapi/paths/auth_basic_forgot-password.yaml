post:
  summary: Request password reset
  deprecated: false
  description: |
    Initiate password reset process by sending reset link to user's email. This is a public endpoint that does not require authentication.
  operationId: forgotPasswordBasic
  tags:
    - Authentication/Reset Password new
    - Authentication
  parameters: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - email
          properties:
            email:
              type: string
              format: email
              description: User's registered email address
              example: user@example.com
        example:
          email: user@example.com
  responses:
    '200':
      description: Password reset request processed (email sent if user exists)
      content:
        application/json:
          schema:
            allOf:
              - $ref: '../components/schemas/StandardResponse.yaml'
              - type: object
                properties:
                  message:
                    type: string
                    example: "Jika email Anda terdaftar, tautan reset password akan dikirimkan."
                  data:
                    type: "null"
                    example: null
          example:
            message: "Jika email Anda terdaftar, tautan reset password akan dikirimkan."
            data: null
      headers: {}
    '400':
      $ref: '../components/responses/ErrorResponses.yaml#/BadRequest'
    '500':
      $ref: '../components/responses/ErrorResponses.yaml#/InternalServerError'
  security: []
