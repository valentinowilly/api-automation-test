get:
  summary: Get vendor matrix for RFQ
  deprecated: false
  description: >
    Retrieve two-tier vendor assignment for a specific RFQ.


    Returns vendorLvl1 (primary) and vendorLvl2 (secondary) for dual-vendor
    RFQs.
  operationId: getRFQVendorMatriks
  tags:
    - Purchase Requests
  parameters:
    - name: rfq_number
      in: path
      description: RFQ number identifier
      required: true
      example: RFQ0000626
      schema:
        type: string
        pattern: ^RFQ[0-9BKG]{8,9}$
        example: RFQ20240001
  responses:
    '200':
      description: Vendor matrix retrieved successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: object
                properties:
                  vendorLvl1:
                    type: array
                    items:
                      type: object
                      properties: {}
                  vendorLvl2:
                    type: array
                    items:
                      type: object
                      properties: {}
      headers: {}
  security:
    - bearer: []
