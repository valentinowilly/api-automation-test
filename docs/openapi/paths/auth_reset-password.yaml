post:
  summary: Reset password
  deprecated: false
  description: |
    Complete password reset with valid token and new password.

    Token is obtained from the password reset email.
  operationId: resetPassword
  tags:
    - Authentication/Old method (Deprecated)
    - Authentication
  parameters:
    - name: token
      in: query
      description: Password reset token from email
      required: true
      schema:
        type: string
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties: {}
        example:
          newPassword: newpassword123
    required: true
  responses:
    '200':
      description: Password reset successful
      content:
        application/json:
          schema:
            type: object
            properties: {}
          example:
            message: Password reset successful
            data:
              success: true
      headers: {}
    '400':
      description: Invalid token or password requirements not met
      content:
        application/json:
          schema:
            type: object
            properties: {}
          example:
            message: Password must be at least 8 characters
            data: error data
      headers: {}
  security:
    - bearer: []
