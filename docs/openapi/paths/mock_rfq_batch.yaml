post:
  tags:
    - Mock
  summary: Create multiple mock RFQs in batch
  description: >
    Creates multiple mock RFQ records in batch for testing purposes. This endpoint is useful for generating test data scenarios with predefined or random RFQ configurations.
    
    **Note**: This endpoint should only be used in development/testing environments.
  operationId: createMockRfqBatch
  security:
    - bearer: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          required:
            - count
          properties:
            count:
              type: integer
              description: Number of mock RFQs to create
              minimum: 1
              maximum: 100
              example: 10
            scenario:
              type: string
              description: Predefined scenario template (optional)
              enum: ["pending_vendor", "pending_dic", "pending_cs", "pending_cl", "completed", "random"]
              example: "pending_vendor"
            vendor_batch:
              type: integer
              description: Vendor batch number (optional, auto-generated if not provided)
              example: 1
        example:
          count: 10
          scenario: "pending_vendor"
          vendor_batch: 1
  responses:
    '200':
      description: Mock RFQs created successfully
      content:
        application/json:
          schema:
            $ref: '../components/schemas/StandardResponse.yaml'
          example:
            message: "Mock RFQs created successfully"
            data:
              created_count: 10
              rfq_numbers: ["RFQ0000100", "RFQ0000101", "RFQ0000102", "RFQ0000103"]
              scenario: "pending_vendor"
    '400':
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErrorResponse.yaml'
          examples:
            validation_error:
              value:
                message: ["\"count\" must be between 1 and 100"]
                data: null
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErrorResponse.yaml'
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErrorResponse.yaml'
          example:
            message: "Failed to create mock RFQs"
            data: null
