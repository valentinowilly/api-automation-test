get:
  summary: Sync/submit RFQ
  deprecated: false
  description: |
    Validate PR threshold and create RFQ items.

    Initiates RFQ creation workflow.
  operationId: syncRFQ
  tags:
    - Purchase Requests
  parameters:
    - name: serverGroups
      in: query
      description: Server group identifier
      required: false
      schema:
        type: string
        enum:
          - BC
          - BCG
          - GEMS
          - gems
          - BKES
  responses:
    '200':
      description: RFQ synced successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: object
                properties:
                  success:
                    type: boolean
      headers: {}
  security:
    - bearer: []
