post:
  summary: Send PR received notification
  deprecated: false
  description: |
    Send email notification to PR creator confirming PR receipt.

    Token is decoded without validation for this operation.
  operationId: sendPRReceived
  tags:
    - Email Notifications
  parameters:
    - name: token
      in: path
      description: JWT token for email-based authentication
      required: true
      example: ''
      schema:
        type: string
        format: jwt
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
  responses:
    '200':
      description: Email sent successfully
      content:
        application/json:
          schema:
            type: object
            properties: {}
          example:
            message: PR received email sent successfully
            data:
              sent: true
      headers: {}
  security:
    - bearer: []
