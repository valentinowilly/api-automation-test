post:
  summary: Manually resend RFQ to spesific vendor
  deprecated: false
  description: >
    Resend RFQ email to vendor with new token.


    Requires authentication. Used by CS to manually resend if vendor hasn't
    confirmed receipt.


    **Dual-Vendor Validation**: For dual-vendor RFQs, validates per-item logic
    before resending.
  operationId: resendRFQVendor
  tags:
    - Email Notifications
  parameters:
    - name: rfq_number
      in: path
      description: RFQ number identifier
      required: true
      example: RFQ0000932
      schema:
        type: string
        pattern: ^RFQ[0-9BKG]{8,9}$
        example: RFQ20240001
    - name: vendor_batch
      in: path
      description: |
        Vendor batch number (1 or 2 for dual-vendor RFQs).

        **Important**: In dual-vendor scenarios:
        - Batch 1: Primary vendor
        - Batch 2: Secondary vendor (only processed if Batch 1 declined)
      required: true
      example: 1
      schema:
        type: integer
        minimum: 1
        maximum: 2
        example: 1
    - name: vendor_code
      in: path
      description: Vendor code identifier
      required: true
      example: '101839'
      schema:
        type: string
        maxLength: 50
        example: V0001234
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties: {}
        example:
          source_vendor_code: '300022'
          source_vendor_batch: 1
  responses:
    '200':
      description: RFQ resent successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: object
                properties:
                  success:
                    type: boolean
                  params:
                    type: object
                    properties:
                      cs_name:
                        type: string
                      cs_email:
                        type: string
                      vendor_name:
                        type: string
                      submission_deadline_date:
                        type: string
                      input_link:
                        type: string
                      table_data:
                        type: array
                        items:
                          type: object
                          properties:
                            id:
                              type: integer
                            uuid:
                              type: string
                            rfq_number:
                              type: string
                            pr_number:
                              type: string
                            item_code:
                              type: string
                            item_text:
                              type: string
                            quantity:
                              type: integer
                            uom:
