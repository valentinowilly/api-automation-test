post:
  summary: Upload single image
  deprecated: false
  description: |
    Upload a single image file for an RFQ item.

    **Constraints**:
    - Max size: 5MB
    - Allowed formats: JPEG, JPG, PNG, GIF
  operationId: uploadSingleImage
  tags:
    - Upload Management
  parameters: []
  requestBody:
    content:
      multipart/form-data:
        schema:
          type: object
          properties:
            image:
              type: string
              format: binary
              example: >-
                file:///Users/mac/Downloads/89328092f089f41d4dcf357aa3735b56-1747103777311-TKT-64974606-ticket-qrcode.png
            rfqItemId:
              type: integer
              example: 1880
            type:
              description: GENERAL | DIC_REJECT_REASON
              example: DIC_REJECT_REASON
              type: string
          required:
            - image
            - rfqItemId
        examples: {}
  responses:
    '200':
      description: Image uploaded successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: object
                properties: {}
      headers: {}
  security:
    - bearer: []
delete:
  summary: Delete single image
  deprecated: false
  description: |
    Delete a single image file by its URL.
  operationId: deleteSingleImage
  tags:
    - Upload Management
  parameters: []
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties: {}
        example:
          filePath: ''
  responses:
    '200':
      description: Image deleted successfully
      content:
        application/json:
          schema:
            type: object
            properties: {}
      headers: {}
  security:
    - bearer: []
