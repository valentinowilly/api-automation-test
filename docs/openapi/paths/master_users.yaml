get:
  summary: Get Users Pagination
  deprecated: false
  description: ''
  tags:
    - Master Data/Users
  parameters:
    - name: page
      in: query
      description: ''
      required: false
      example: '1'
      schema:
        type: string
    - name: limit
      in: query
      description: ''
      required: false
      example: '10'
      schema:
        type: string
    - name: search
      in: query
      description: ''
      required: false
      schema:
        type: string
    - name: sort_by
      in: query
      description: ''
      required: false
      example: updated_at
      schema:
        type: string
        enum:
          - id
          - name
          - email
          - updated_at
        default: updated_at
    - name: order
      in: query
      description: ''
      required: false
      example: desc
      schema:
        type: string
        enum:
          - asc
          - desc
        default: desc
    - name: type
      in: query
      description: ''
      required: false
      example: 2
      schema:
        type: integer
        enum:
          - 1
          - 2
  responses:
    '200':
      description: ''
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        email:
                          type: string
                        type:
                          type: object
                          properties:
                            value:
                              type: integer
                            label:
                              type: string
                          required:
                            - value
                            - label
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
                        deleted_at:
                          type: string
                          format: date-time
                          nullable: true
                      required:
                        - id
                        - name
                        - email
                        - type
                        - created_at
                        - updated_at
                  pagination:
                    type: object
                    properties:
                      totalItems:
                        type: integer
                      totalPages:
                        type: integer
                      currentPage:
                        type: integer
                      itemsPerPage:
                        type: integer
                    required:
                      - totalItems
                      - totalPages
                      - currentPage
                      - itemsPerPage
                required:
                  - data
                  - pagination
            required:
              - message
              - data
