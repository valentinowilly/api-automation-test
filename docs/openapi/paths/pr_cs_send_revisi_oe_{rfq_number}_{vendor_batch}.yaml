post:
  summary: Send OE revision action
  deprecated: false
  description: |
    Request OE (Owner Estimate) revision for RFQ items.

    **Action**: rfq_tipe = 'revisi_oe'

    Requires `item_value` (new OE value) for each item.
  operationId: sendRevisiOE
  tags:
    - CS Operations
  parameters:
    - name: rfq_number
      in: path
      description: RFQ number identifier
      required: true
      example: ''
      schema:
        type: string
        pattern: ^RFQ[0-9BKG]{8,9}$
        example: RFQ20240001
    - name: vendor_batch
      in: path
      description: |
        Vendor batch number (1 or 2 for dual-vendor RFQs).

        **Important**: In dual-vendor scenarios:
        - Batch 1: Primary vendor
        - Batch 2: Secondary vendor (only processed if Batch 1 declined)
      required: true
      example: 0
      schema:
        type: integer
        minimum: 1
        maximum: 2
        example: 1
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties: {}
        example:
          items:
            - id: 123
              item_value: 120000
          rfq_tipe: revisi_oe
    required: true
  responses:
    '200':
      description: OE revision sent successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: object
                properties: {}
      headers: {}
  security:
    - bearer: []
