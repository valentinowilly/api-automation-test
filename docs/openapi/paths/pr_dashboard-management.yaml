        type: string
        enum:
          - qcf_number
          - po_number
          - sla
          - status
          - action
          - qcf_date
    - name: order
      in: query
      description: ''
      required: false
      example: asc
      schema:
        type: string
        enum:
          - asc
          - desc
    - name: search
      in: query
      description: ''
      required: false
      schema:
        type: string
    - name: date_from
      in: query
      description: ''
      required: false
      example: '2026-02-10'
      schema:
        type: string
    - name: date_to
      in: query
      description: ''
      required: false
