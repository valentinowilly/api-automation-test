    - name: limit
      in: query
      description: ''
      required: false
      example: '10'
      schema:
        type: string
    - name: status_filter
      in: query
      description: ''
      required: false
      example: 'Waiting CL  '
      schema:
        type: string
        enum:
          - 'Waiting CL  '
          - ' Waiting Management '
          - 'Manual Sourcing '
          - 'PO Published '
