post:
  summary: Upload multiple images
  deprecated: false
  description: |
    Upload up to 5 images for an RFQ item.

    **Constraints**:
    - Max files: 5
    - Max size per file: 5MB
    - Allowed formats: JPEG, JPG, PNG, GIF

    **Returns**: Array of image metadata with public URLs.
  operationId: uploadMultipleImages
  tags:
    - Upload Management
  parameters: []
  requestBody:
    content:
      multipart/form-data:
        encoding:
          images:
            contentType: image/jpeg, image/jpg, image/png, image/gif
        schema:
          type: object
          properties:
            images:
              type: array
              items:
                type: string
                format: binary
              maxItems: 5
              description: Array of image files
              example: ''
            rfqItemId:
              type: integer
              description: RFQ item ID to associate with images
              example: 0
            type:
              description: GENERAL | DIC_REJECT_REASON
              example: ''
              type: string
          required:
            - images
            - rfqItemId
        examples: {}
  responses:
    '200':
      description: Images uploaded successfully
      content:
        application/json:
          schema:
            type: object
            properties: {}
          example:
            message: Images uploaded successfully
            files:
              - id: 1
                filePath: http://localhost:3000/uploads/images/1706544123456-image1.jpg
                rfqItemId: 123
              - id: 2
                filePath: http://localhost:3000/uploads/images/1706544123457-image2.jpg
                rfqItemId: 123
      headers: {}
  security:
    - bearer: []
delete:
  summary: Delete multiple images
  deprecated: false
  description: |
    Delete multiple image files by their URLs.

    **Note**: Deletes both database record and file from disk.
  operationId: deleteMultipleImages
  tags:
    - Upload Management
  parameters: []
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties: {}
    required: true
  responses:
    '200':
      description: Images deleted successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: object
                properties:
                  deleted:
                    type: integer
      headers: {}
  security:
    - bearer: []
