post:
  summary: Create Divisions
  deprecated: false
  description: ''
  tags:
    - Master Data/Divisions
  parameters: []
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties: {}
        example: |-
          [
              {
                  "name": "TEST",
                  "is_active": true,
              },
              {
                  "name": "TEST-2",
                  "is_active": false,
              }
          ]
    required: true
  responses:
    '200':
      description: ''
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: string
                nullable: true
            required:
              - message
              - data
          example:
            message: Division created successfully
            data: null
      headers: {}
  security:
    - bearer: []
get:
  summary: Get Division Pagination
  deprecated: false
  description: ''
  tags:
    - Master Data/Divisions
  parameters:
    - name: page
      in: query
      description: ''
      required: false
      example: '1'
      schema:
        type: string
    - name: limit
      in: query
      description: ''
      required: false
      example: '10'
      schema:
        type: string
    - name: search
      in: query
      description: ''
      required: false
      example: ''
      schema:
        type: string
    - name: sort_by
      in: query
      description: ''
      required: false
      example: updated_at
      schema:
        type: string
        enum:
          - id
          - name
          - updated_at
        default: updated_at
    - name: order
      in: query
      description: ''
      required: false
      example: desc
      schema:
        type: string
        enum:
          - asc
          - desc
        default: desc
    - name: is_active
      in: query
      description: ''
      required: false
      example: 'false'
      schema:
        type: boolean
  responses:
    '200':
      description: ''
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                        name:
                          type: string
                        created_at:
                          type: string
                        updated_at:
                          type: string
                  pagination:
                    type: object
                    properties:
                      totalItems:
                        type: integer
                      totalPages:
                        type: integer
                      currentPage:
                        type: integer
                      itemsPerPage:
                        type: integer
                    required:
                      - totalItems
                      - totalPages
                      - currentPage
                      - itemsPerPage
                required:
                  - data
                  - pagination
            required:
              - message
              - data
          example:
            message: Divisions found successfully
            data:
              data:
                - id: 15
                  name: TEST - updated
                  is_active: false
                  created_at: '2026-03-31T08:45:03.000Z'
                  updated_at: '2026-03-31T08:45:51.000Z'
                  deleted_at: null
              pagination:
                totalItems: 1
                totalPages: 1
                currentPage: 1
                itemsPerPage: 10
      headers: {}
  security:
    - bearer: []
