post:
  tags:
    - Cron Jobs & Manual Triggers
  summary: Handle expired management review RFQs
  description: >
    Manually trigger the cron job that handles RFQs where management review has expired. This endpoint automatically processes RFQs that have exceeded their management review deadline and performs necessary status updates and notifications.
    
    **Note**: This is normally executed by the cron scheduler but can be manually triggered for testing or recovery purposes.
  operationId: handleExpiredManagementReview
  security:
    - bearer: []
  responses:
    '200':
      description: Successfully processed expired management reviews
      content:
        application/json:
          schema:
            $ref: '../components/schemas/StandardResponse.yaml'
          example:
            message: "Expired management reviews processed successfully"
            data:
              processed_count: 5
              rfq_numbers: ["RFQ0000042", "RFQ0000043", "RFQ0000044"]
    '401':
      description: Unauthorized - invalid or missing JWT token
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErrorResponse.yaml'
    '500':
      description: Internal server error during processing
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErrorResponse.yaml'
          example:
            message: "Failed to process expired management reviews"
            data: null
