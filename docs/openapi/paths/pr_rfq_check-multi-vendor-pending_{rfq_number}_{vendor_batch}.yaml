get:
  summary: Check multi-vendor pending status
  deprecated: false
  description: |
    Check if RFQ has multiple vendors with pending status.

    Used for dual-vendor RFQ workflow validation.
  operationId: checkMultiVendorPending
  tags:
    - Purchase Requests
  parameters:
    - name: rfq_number
      in: path
      description: RFQ number identifier
      required: true
      example: ''
      schema:
        type: string
        pattern: ^RFQ[0-9BKG]{8,9}$
        example: RFQ20240001
    - name: vendor_batch
      in: path
      description: |
        Vendor batch number (1 or 2 for dual-vendor RFQs).

        **Important**: In dual-vendor scenarios:
        - Batch 1: Primary vendor
        - Batch 2: Secondary vendor (only processed if Batch 1 declined)
      required: true
      example: 0
      schema:
        type: integer
        minimum: 1
        maximum: 2
        example: 1
  responses:
    '200':
      description: Status retrieved successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: object
                properties:
                  has_multi_vendor_pending:
                    type: boolean
      headers: {}
  security:
    - bearer: []
