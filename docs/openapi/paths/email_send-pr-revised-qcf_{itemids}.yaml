post:
  summary: Send PR revised to proceed to QCF
  deprecated: false
  description: |
    Send email notification for PR revision to proceed to QCF.
  operationId: sendPRRevisedQCF
  tags:
    - Email Notifications
  parameters:
    - name: itemids
      in: path
      description: Comma-separated item IDs
      required: true
      example: ''
      schema:
        type: string
        example: 123,124,125
  responses:
    '200':
      description: Email sent successfully
      content:
        application/json:
          schema:
            type: object
            properties: {}
      headers: {}
  security:
    - bearer: []
