get:
  summary: Get vendor matrix by material group
  deprecated: false
  description: |
    Retrieve vendor matrix mapping for a specific external material group.
  operationId: getVendorMatriks
  tags:
    - Purchase Requests
  parameters:
    - name: ext_mat_group
      in: path
      description: External material group code
      required: true
      example: ''
      schema:
        type: string
        maxLength: 10
        example: MAT001
  responses:
    '200':
      description: Vendor matrix retrieved successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: array
                items:
                  type: object
                  properties: {}
      headers: {}
  security:
    - bearer: []
