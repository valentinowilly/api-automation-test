get:
  summary: Get declined RFQ items by Token
  deprecated: false
  description: |
    Retrieve RFQ items declined by vendor (status_vendor = 2).
  operationId: getDeclinedItemsByToken
  tags:
    - CS Operations
  parameters:
    - name: token
      in: path
      description: ''
      required: true
      example: >-
        eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyZnFfbnVtYmVyIjoiUkZRMDAwMDYyNiIsInZlbmRvcl9iYXRjaCI6MiwiaWF0IjoxNzY5NTAxMTc1LCJleHAiOjE3NzAxMDU5NzV9.qiR26w8jixhXCMg4ax8wifKPbeZessx8iuCr1VH8Za4
      schema:
        type: string
  responses:
    '200':
      description: Declined items retrieved successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: array
                items:
                  type: object
                  properties: {}
      headers: {}
  security:
    - bearer: []
