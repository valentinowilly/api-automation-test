post:
  summary: Send RFQ to vendor
  deprecated: false
  description: >
    Send Request for Quotation email to vendor with JWT token link.


    Creates new token entry in rfqTokenEmail table with expiration based on SLA
    config + 1 day.


    Token payload includes: rfq_number, vendor_batch, vendor_code, items, iat.
  operationId: sendRequestForQuotation
  tags:
    - Email Notifications
  parameters:
    - name: token
      in: path
      description: JWT token for email-based authentication
      required: true
      example: ''
      schema:
        type: string
        format: jwt
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
  responses:
    '200':
      description: RFQ email sent successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: object
                properties:
                  sent:
                    type: boolean
                  token:
                    type: string
                    description: Generated JWT token
                  rfq_number:
                    type: string
                  vendor_batch:
                    type: integer
      headers: {}
  security:
    - bearer: []
