get:
  summary: Get Google OAuth URL
  deprecated: false
  description: Generate Google OAuth2 authorization URL for initiating the login flow. This is a public endpoint.
  tags:
    - Authentication/New method
  parameters:
    - name: state
      in: query
      description: Optional state parameter for CSRF protection
      required: false
      schema:
        type: string
  responses:
    '200':
      description: Successfully generated OAuth URL
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: object
                properties:
                  url:
                    type: string
                    description: Google OAuth2 authorization URL
                required:
                  - url
            required:
              - message
              - data
          example:
            message: Login Berhasil
            data:
              url: >-
                https://accounts.google.com/o/oauth2/v2/auth?client_id=229765958753-vj9dk2gbo9lbgd6spn8btmcai9c6cr4m.apps.googleusercontent.com&response_type=code&redirect_uri=https%3A%2F%2Fsinarmas-aigen-dev.devnstg.com%2Fsso%2Fcallback.html&scope=openid+profile+email&access_type=offline&prompt=consent
      headers: {}
  security: []
post:
  summary: Authenticate with Google OAuth
  deprecated: false
  description: Complete Google OAuth authentication by exchanging authorization code for access token, or directly using an access token. This is a public endpoint.
  tags:
    - Authentication/New method
  parameters: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          properties:
            authorization_code:
              type: string
              description: Authorization code from Google OAuth callback
              example: 4/0AfrIepAOtuBlkq05BXfdTP8kmbEOx0zZXhGr4yqbBZg0UBadQ495O5qqulJnZ7NjlQtt_w
            access_token:
              type: string
              description: Google access token (alternative to authorization_code for advanced flows)
          oneOf:
            - required: [authorization_code]
            - required: [access_token]
        example:
          authorization_code: >-
            4/0AfrIepAOtuBlkq05BXfdTP8kmbEOx0zZXhGr4yqbBZg0UBadQ495O5qqulJnZ7NjlQtt_w
  responses:
    '200':
      description: Successfully authenticated with Google OAuth
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: object
                properties:
                  access_token:
                    type: string
                    description: JWT access token for API authentication
                required:
                  - access_token
            required:
              - message
              - data
          example:
            message: Login Berhasil
            data:
              access_token: >-
                eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJkYXRhIjp7ImVtYWlsIjoieXVzcmlsYWRyLjM3QGdtYWlsLmNvbSIsImxldmVsIjpudWxsLCJyb2xlIjpudWxsLCJwZXJtaXNzaW9ucyI6W10sInVzZXJfaWQiOjM3NiwidXNlcm5hbWUiOiJ5dXNyaWwtYWRyIn0sImlhdCI6MTc3MTM4NDQwOCwiZXhwIjoxNzcxNTU3MjA4fQ.1MsrYCd5r5Mca2Dqi0wctYlMjYrMnuoiyEQTskb-6bI
      headers: {}
    '400':
      $ref: '../components/responses/ErrorResponses.yaml#/BadRequest'
    '401':
      $ref: '../components/responses/ErrorResponses.yaml#/Unauthorized'
    '500':
      $ref: '../components/responses/ErrorResponses.yaml#/InternalServerError'
  security: []
