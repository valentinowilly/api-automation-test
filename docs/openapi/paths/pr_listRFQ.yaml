get:
  summary: List RFQs
  deprecated: false
  description: |
    Retrieve list of RFQs for authenticated user (CS role).
  operationId: listRFQ
  tags:
    - Purchase Requests
  parameters:
    - name: page
      in: query
      description: ''
      required: false
      schema:
        type: integer
        default: 1
    - name: limit
      in: query
      description: ''
      required: false
      schema:
        type: integer
        default: 10
  responses:
    '200':
      description: RFQs retrieved successfully
      content:
        application/json:
          schema:
            type: object
            properties: {}
      headers: {}
  security:
    - bearer: []
