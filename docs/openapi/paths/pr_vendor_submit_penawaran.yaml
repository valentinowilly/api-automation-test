put:
  summary: Vendor submit quotation
  deprecated: false
  description: >
    Process vendor quotation submission with comprehensive validation.


    **Validation Rules**:

    - Price validation via `maxPricevalidation()` (min/max percentage
    thresholds)

    - For accepted items: quotation_number, vendor_description,
    vendor_delivery_date required

    - For rejected items: vendor_reject_reason required


    **Dual-Vendor Logic**:

    - Vendor 2 items only processed if Vendor 1 declined for that specific item


    **Response Data**:

    - processedItems: Successfully submitted items

    - rejectedForPrice: Items rejected due to price validation

    - dicLink: DIC confirmation link (if submission complete)

    - token: Generated DIC token


    After successful submission, sends email notification to DIC for
    confirmation.
  operationId: vendorSubmitQuotation
  tags:
    - Vendor Operations
  parameters: []
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties: {}
        example: |-
          {
              "items": [
                  {
                      "id": 1824,
                      "status_vendor": 1,
                      "vendor_price": 150000,
                      "quotation_number": "QUO2024001",
                      "vendor_description": "Premium quality office supplies",
                      "vendor_delivery_date": "2026-02-15",
                      "vendor_brand": "Dell",
                      "vendor_warranty": 12,
                      "vendor_address_details": "Jkt",
                      "vendor_sloc": "2001"
                  }
                  // Need confirmation spec status
                  // ,{
                  //     "id": 1909,
                  //     "status_vendor": 3,
                  //     "vendor_description": "Need spec for item 2"
                  // },
              ],
              "is_submit": 1
          }
  responses:
    '200':
      description: Quotation submitted successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: object
                properties:
                  processedItems:
                    type: array
                    items:
                      type: object
                      properties: {}
                  rejectedForPrice:
                    type: array
                    items:
                      type: object
                      properties:
                        item:
                          type: object
                          properties: {}
                        reason:
                          type: string
                  dicLink:
                    type: string
                    format: uri
                    description: DIC confirmation link (if submission complete)
                  token:
                    type: string
                    description: Generated DIC token
                  rfq_number:
                    type: string
                  vendor_batch:
                    type: integer
          example:
            message: Quotation submitted successfully
            data:
              processedItems:
                - id: 123
                  status_vendor: 1
                  vendor_price: 150000
              summary:
                processedCount: 0
                higherPriceCount: 1
                updatedInDb: 1
              other:
                dicLink: >-
                  http://localhost:5173/#/confirmation-item-dic/eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyZnFfbnVtYmVyIjoiUkZRMDAwMDYyOCIsInZlbmRvcl9iYXRjaCI6MiwiaWF0IjoxNzY4OTY4Mzc2LCJleHAiOjE3NzE2NDY3NzZ9.oDUTuZNdSln1_q9R2e6Mlx_1YgpXurnoPlAlVT4Xmb0
                token: >-
                  eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyZnFfbnVtYmVyIjoiUkZRMDAwMDYyOCIsInZlbmRvcl9iYXRjaCI6MiwiaWF0IjoxNzY4OTY4Mzc2LCJleHAiOjE3NzE2NDY3NzZ9.oDUTuZNdSln1_q9R2e6Mlx_1YgpXurnoPlAlVT4Xmb0
                rfq_number: RFQ0000628
                vendor_batch: 2
      headers: {}
  security:
    - bearer: []
