post:
  summary: Upload single evidence file
  deprecated: false
  description: |
    Upload a single evidence file for an RFQ item.

    **Constraints**:
    - Max size: 10MB
  operationId: uploadSingleEvidence
  tags:
    - Upload Management
  parameters: []
  requestBody:
    content:
      multipart/form-data:
        schema:
          type: object
          properties:
            evidence:
              type: string
              format: binary
              example: ''
            rfqItemId:
              type: integer
              example: 0
          required:
            - evidence
            - rfqItemId
    required: true
  responses:
    '200':
      description: Evidence uploaded successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: object
                properties: {}
      headers: {}
  security:
    - bearer: []
