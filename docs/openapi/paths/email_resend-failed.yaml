post:
  summary: Resend failed emails
  deprecated: false
  description: >
    Retry sending emails that previously failed.


    Processes failed emails from FailedEmail table with retry tracking (max 5
    retries).


    Typically triggered by cron job.
  operationId: resendFailedEmails
  tags:
    - Email Notifications
  parameters: []
  responses:
    '200':
      description: Failed emails processing completed
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: object
                properties:
                  processed:
                    type: integer
                  succeeded:
                    type: integer
                  failed:
                    type: integer
      headers: {}
  security:
    - bearer: []
