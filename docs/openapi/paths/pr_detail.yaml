get:
  summary: Get RFQ detail
  deprecated: false
  description: |
    Retrieve detailed information for a specific RFQ.
  operationId: getRFQDetail
  tags:
    - Purchase Requests
  parameters:
    - name: rfqNumber
      in: query
      description: ''
      required: true
      schema:
        type: string
        example: RFQ20240001
  responses:
    '200':
      description: RFQ details retrieved successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: array
                items:
                  type: object
                  properties: {}
      headers: {}
  security:
    - bearer: []
