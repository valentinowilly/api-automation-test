post:
  summary: Upload single document
  deprecated: false
  description: |
    Upload a single document file for an RFQ.

    **Constraints**:
    - Max size: 10MB
    - Allowed formats: PDF, DOC, DOCX, XLS, XLSX
  operationId: uploadSingleDocument
  tags:
    - Upload Management
  parameters: []
  requestBody:
    content:
      multipart/form-data:
        schema:
          type: object
          properties:
            document:
              type: string
              format: binary
              example: ''
            rfq_number:
              type: string
              example: ''
            vendor_code:
              type: string
              example: ''
          required:
            - document
            - rfq_number
            - vendor_code
    required: true
  responses:
    '200':
      description: Document uploaded successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: object
                properties: {}
      headers: {}
  security:
    - bearer: []
delete:
  summary: Delete single document
  deprecated: false
  description: |
    Delete a single document file by its URL.
  operationId: deleteSingleDocument
  tags:
    - Upload Management
  parameters: []
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties: {}
    required: true
  responses:
    '200':
      description: Document deleted successfully
      content:
        application/json:
          schema:
            type: object
            properties: {}
      headers: {}
  security:
    - bearer: []
