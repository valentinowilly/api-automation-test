get:
  summary: Get revised RFQ by DIC
  deprecated: false
  description: |
    Retrieve RFQ items revised by DIC for vendor resubmission.

    Used when DIC requests revision (status_dic = 3).
  operationId: getRevisedRFQ
  tags:
    - Vendor Operations
  parameters:
    - name: rfq_number
      in: query
      description: ''
      required: false
      example: RFQ0000624
      schema:
        type: string
  responses:
    '200':
      description: Revised RFQ items retrieved successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: array
                items:
                  type: object
                  properties: {}
      headers: {}
  security:
    - bearer: []
