get:
  summary: Dashboard Vendor
  deprecated: false
  description: ''
  tags:
    - Dashboard
  parameters:
    - name: page
      in: query
      description: ''
      required: false
      example: '1'
      schema:
        type: string
    - name: limit
      in: query
      description: ''
      required: false
      example: '10'
      schema:
        type: string
    - name: status_filter
      in: query
      description: ''
      required: false
      example: Need Action
      schema:
        type: string
        enum:
          - Need Action
          - Waiting User
          - Waiting Procurement
          - PO Published
          - Manual Sourcing
          - Waiting CS
          - Not Awarded
    - name: action_filter
      in: query
      description: ''
      required: false
      example: Submit RFQ
      schema:
        type: string
        enum:
          - Submit RFQ
          - Request Revise
    - name: sort
      in: query
      description: ''
      required: false
      example: rfq_number
      schema:
        type: string
        enum:
          - rfq_number
          - pr_number
          - sla
          - status
          - action
          - pr_release_date
    - name: order
      in: query
      description: ''
      required: false
      example: asc
      schema:
        type: string
        enum:
          - asc
          - desc
    - name: search
      in: query
      description: ''
      required: false
      schema:
        type: string
    - name: date_to
      in: query
      description: ''
      required: false
      example: '2026-02-10'
      schema:
        type: string
    - name: date_from
      in: query
      description: ''
      required: false
      example: '2026-02-10'
      schema:
        type: string
  responses:
    '200':
      description: ''
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: object
                properties:
                  summary:
