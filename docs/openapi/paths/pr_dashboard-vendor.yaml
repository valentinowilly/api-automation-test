                      total_rfq:
                        type: integer
                      total_items:
                        type: integer
                      need_action:
                        type: integer
                      waiting:
                        type: integer
                      po_published_items:
                        type: integer
                      manual_sourcing:
                        type: integer
                    required:
                      - total_rfq
                      - total_items
                      - need_action
                      - waiting
                      - po_published_items
                      - manual_sourcing
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        rfq_number:
                          type: string
                        pr_number:
                          type: string
                        server_groups:
                          type: string
                        vendor_code:
                          type: string
                        vendor_name:
                          type: string
                        vendor_batch:
                          type: integer
                        submission_deadline:
                          type: string
                          nullable: true
                        submission_deadline_remaining_days:
                          type: integer
                          nullable: true
                        cs_name:
                          type: string
                        cs_email:
                          type: string
                        pr_creator_email:
                          type: string
                        pr_requestor_email:
                          type: string
                        status_vendor:
                          type: integer
                        status_dic:
                          type: integer
                          nullable: true
                        dic_token:
                          type: string
                          nullable: true
                        milestone_id:
                          type: integer
                        status_milestone:
                          type: string
                        status_submilestone:
                          type: string
                        status:
                          type: string
                        status_group:
                          type: string
                        action:
                          type: string
                          nullable: true
                        items:
                          type: array
                          items:
                            type: object
                            properties:
                              quantity:
                                type: integer
                              item_code:
                                type: string
                              item_text:
                                type: string
                            required:
                              - quantity
                              - item_code
                              - item_text
                      required:
                        - rfq_number
                        - pr_number
                        - server_groups
                        - vendor_code
                        - vendor_name
                        - vendor_batch
                        - submission_deadline
                        - submission_deadline_remaining_days
                        - cs_name
                        - cs_email
                        - pr_creator_email
                        - pr_requestor_email
                        - status_vendor
                        - status_dic
                        - dic_token
                        - milestone_id
                        - status_milestone
                        - status_submilestone
                        - status
                        - status_group
                        - action
                        - items
