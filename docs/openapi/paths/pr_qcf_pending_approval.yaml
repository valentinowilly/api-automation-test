get:
  summary: Get List QCF Pending For Testing
  deprecated: false
  description: ''
  tags:
    - Endpoint generate data for testing
  parameters:
    - name: rfq_number
      in: query
      description: ''
      required: false
      schema:
        type: string
    - name: vendor_code
      in: query
      description: ''
      required: false
      schema:
        type: string
    - name: page
      in: query
      description: ''
      required: false
      example: '1'
      schema:
        type: string
    - name: limit
      in: query
      description: ''
      required: false
      example: '20'
      schema:
        type: string
  responses:
    '200':
      description: ''
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: array
                items:
                  type: object
                  properties:
                    rfq_number:
                      type: string
                    vendor_code:
                      type: string
                    vendor_batch:
                      type: integer
                    vendor_name:
                      type: string
                    scenario:
                      type: object
                      properties:
                        is_single_vendor:
                          type: boolean
                        total_vendors:
                          type: integer
                        guaranteed_dic_link:
                          type: boolean
                      required:
                        - is_single_vendor
                        - total_vendors
                        - guaranteed_dic_link
                    token:
                      type: object
                      properties:
                        has_token:
                          type: boolean
                        is_active:
                          type: boolean
                        is_valid:
                          type: boolean
                        hours_until_expiry:
                          type: integer
                          nullable: true
                        expires_at:
                          type: string
                          nullable: true
                      required:
                        - has_token
                        - is_active
                        - is_valid
                        - hours_until_expiry
                        - expires_at
                    items_summary:
                      type: object
                      properties:
                        total:
                          type: integer
                        pending:
                          type: integer
                        accepted:
                          type: integer
                        declined:
                          type: integer
                      required:
                        - total
                        - pending
                        - accepted
                        - declined
                    items:
                      type: array
                      items:
                        type: object
                        properties:
                          id:
                            type: integer
                          item_code:
                            type: string
                          item_text:
                            type: string
                          item_value:
                            type: integer
                          quantity:
                            type: integer
                          uom:
                            type: string
                          delivery_date:
                            type: string
                          status_vendor:
                            type: integer
                          price_range:
                            type: object
                            properties:
                              min:
                                type: integer
                              max:
                                type: integer
                              min_percent:
                                type: integer
                              max_percent:
                                type: integer
                            required:
                              - min
                              - max
                              - min_percent
                              - max_percent
                        required:
                          - id
                          - item_code
                          - item_text
                          - item_value
                          - quantity
                          - uom
                          - delivery_date
                          - status_vendor
                          - price_range
                    ready_for_testing:
                      type: boolean
                  required:
                    - rfq_number
                    - vendor_code
                    - vendor_batch
                    - vendor_name
                    - scenario
                    - token
                    - items_summary
                    - items
                    - ready_for_testing
              pagination:
                type: object
                properties:
                  totalItems:
                    type: integer
                  totalPages:
                    type: integer
                  currentPage:
                    type: integer
                  itemsPerPage:
                    type: integer
                required:
                  - totalItems
                  - totalPages
                  - currentPage
                  - itemsPerPage
              price_config:
                type: object
                properties:
                  min_percent:
                    type: integer
                  max_percent:
                    type: integer
                required:
                  - min_percent
                  - max_percent
            required:
              - message
              - data
              - pagination
              - price_config
      headers: {}
  security:
    - bearer: []
