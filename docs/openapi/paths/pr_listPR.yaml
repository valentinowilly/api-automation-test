get:
  summary: List purchase requests
  deprecated: false
  description: |
    Retrieve list of purchase requests with pagination support.
  operationId: listPR
  tags:
    - Purchase Requests
  parameters:
    - name: page
      in: query
      description: ''
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    - name: limit
      in: query
      description: ''
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
  responses:
    '200':
      description: Purchase requests retrieved successfully
      content:
        application/json:
          schema:
            type: object
            properties: {}
      headers: {}
  security:
    - bearer: []
