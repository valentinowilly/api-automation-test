post:
  summary: Manually resend email to DIC
  deprecated: false
  description: |
    Manually resend DIC confirmation email for specific RFQ.

    Uses existing token or creates new one if needed.
  operationId: resendEmailToDIC
  tags:
    - Cron Jobs & Manual Triggers
  parameters:
    - name: rfq_number
      in: path
      description: RFQ number identifier
      required: true
      example: RFQ0000B61
      schema:
        type: string
        pattern: ^RFQ[0-9BKG]{8,9}$
        example: RFQ20240001
    - name: vendor_batch
      in: path
      description: |
        Vendor batch number (1 or 2 for dual-vendor RFQs).

        **Important**: In dual-vendor scenarios:
        - Batch 1: Primary vendor
        - Batch 2: Secondary vendor (only processed if Batch 1 declined)
      required: true
      example: 3
      schema:
        type: integer
        minimum: 1
        maximum: 2
        example: 1
  responses:
    '200':
      description: Email resent successfully
      content:
        application/json:
          schema:
            type: object
            properties: {}
      headers: {}
  security:
    - bearer: []
