get:
  tags:
    - Mock
  summary: Get mock RFQ scenario templates
  description: >
    Retrieves a list of available predefined scenario templates for creating mock RFQs. Each template represents a different workflow state or testing scenario.
    
    **Note**: This endpoint should only be used in development/testing environments.
  operationId: getMockRfqTemplates
  security:
    - bearer: []
  responses:
    '200':
      description: Successfully retrieved scenario templates
      content:
        application/json:
          schema:
            $ref: '../components/schemas/StandardResponse.yaml'
          example:
            message: "Mock RFQ templates retrieved successfully"
            data:
              templates:
                - id: "pending_vendor"
                  name: "Pending Vendor Submission"
                  description: "RFQs awaiting vendor quotation submission"
                - id: "pending_dic"
                  name: "Pending DIC Confirmation"
                  description: "RFQs awaiting DIC confirmation"
                - id: "pending_cs"
                  name: "Pending CS Approval"
                  description: "RFQs awaiting CS review and approval"
                - id: "pending_cl"
                  name: "Pending CL Approval"
                  description: "RFQs awaiting CL approval"
                - id: "completed"
                  name: "Completed RFQs"
                  description: "Fully completed RFQs ready for QCF"
                - id: "random"
                  name: "Random Mix"
                  description: "Random assortment of different states"
    '401':
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErrorResponse.yaml'
    '500':
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '../components/schemas/ErrorResponse.yaml'
          example:
            message: "Failed to retrieve templates"
            data: null
