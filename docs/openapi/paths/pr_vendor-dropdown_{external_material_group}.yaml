get:
  summary: Get dropdown vendor matrix
  deprecated: false
  description: |
    Retrieve vendor matrix mapping for a specific external material group.
  operationId: getVendorDropdown
  tags:
    - Purchase Requests
  parameters:
    - name: external_material_group
      in: path
      description: ''
      required: true
      example: '5825'
      schema:
        type: string
  responses:
    '200':
      description: Vendor matrix retrieved successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: array
                items:
                  type: object
                  properties:
                    vendor_code:
                      type: string
                    vendor_name:
                      type: string
                    vendor_type:
                      type: string
                    level:
                      type: integer
                  required:
                    - vendor_code
                    - vendor_name
                    - vendor_type
                    - level
            required:
              - message
              - data
          example:
            message: Successfully retrieved vendor dropdown.
            data:
              - vendor_code: '101426'
                vendor_name: MITRA USAHA, CV
                vendor_type: direct
                level: 1
              - vendor_code: '300022'
                vendor_name: KOPERASI KARYAWAN BINA BERSAMA, KOP
                vendor_type: agregator
                level: 2
      headers: {}
  security:
    - bearer: []
