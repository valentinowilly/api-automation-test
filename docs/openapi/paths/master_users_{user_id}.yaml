get:
  summary: Get User by Id
  deprecated: false
  description: ''
  tags:
    - Master Data/Users
  parameters:
    - name: user_id
      in: path
      description: ''
      required: true
      example: '2'
      schema:
        type: string
  responses:
    '200':
      description: ''
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: object
                properties:
                  id:
                    type: integer
                  name:
                    type: string
                  email:
                    type: string
                  type:
                    type: object
                    properties:
                      value:
                        type: integer
                      label:
                        type: string
                    required:
                      - value
                      - label
                  created_at:
                    type: string
                    format: date-time
                  updated_at:
                    type: string
                    format: date-time
                  deleted_at:
                    type: string
                    format: date-time
                    nullable: true
                required:
                  - id
                  - name
                  - email
                  - type
                  - created_at
                  - updated_at
            required:
              - message
              - data
          example:
            message: User found successfully
            data:
              id: 2
              name: Ari Anshori
              email: ari.anshori@beraucoal.co.id
              type:
                value: 1
                label: INTERNAL
              created_at: '2026-03-02T16:58:39.000Z'
              updated_at: '2026-03-02T16:58:39.000Z'
              deleted_at: null
      headers: {}
  security:
    - bearer: []
