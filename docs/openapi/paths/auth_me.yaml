get:
  summary: Get Current User Profile
  deprecated: false
  description: Retrieve the authenticated user's profile information including available roles and permissions.
  tags:
    - Authentication/New method
  parameters: []
  responses:
    '200':
      description: Successfully retrieved current user profile
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: object
                properties:
                  current_user:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      email:
                        type: string
                      type:
                        type: object
                        properties:
                          value:
                            type: integer
                            description: Numeric user type (1=INTERNAL, 2=VENDOR)
                          label:
                            type: string
                            enum: [INTERNAL, VENDOR]
                            description: Human-readable user type label
                        required:
                          - value
                          - label
                      asigned_by:
                        type: integer
                      created_at:
                        type: string
                        format: date-time
                      updated_at:
                        type: string
                        format: date-time
                      deleted_at:
                        type: string
                        format: date-time
                        nullable: true
                    required:
                      - id
                      - name
                      - email
                      - type
                      - asigned_by
                      - created_at
                      - updated_at
                  available_roles:
                    type: array
                    items:
                      type: string
                    description: Array of role slugs available to the user
                    example: ["admin", "category-specialist"]
                  available_vendor_codes:
                    type: array
                    items:
                      type: string
                    description: Array of vendor codes for vendor-type users (empty for internal users)
                    example: []
                required:
                  - current_user
                  - available_roles
                  - available_vendor_codes
            required:
              - message
              - data
          example:
            message: Profile Berhasil
            data:
              current_user:
                id: 1
                name: Admin Procurement
                email: procurement@sinarmasmining.com
                type:
                  value: 1
                  label: INTERNAL
                asigned_by: 0
                created_at: '2026-03-05T10:46:05.000Z'
                updated_at: '2026-03-05T10:46:05.000Z'
                deleted_at: null
              available_roles:
                - admin
                - category-specialist
              available_vendor_codes: []
      headers: {}
    '401':
      $ref: '../components/responses/ErrorResponses.yaml#/Unauthorized'
    '500':
      $ref: '../components/responses/ErrorResponses.yaml#/InternalServerError'
  security:
    - bearer: []
