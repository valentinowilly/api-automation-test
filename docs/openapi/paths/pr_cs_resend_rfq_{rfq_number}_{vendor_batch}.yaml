post:
  summary: Manually resend RFQ to vendor
  deprecated: false
  description: >
    CS manually resends RFQ email to vendor if vendor hasn't confirmed receipt.


    Same as `/email/resend-request-for-quotation` but requires BearerAuth
    instead of path parameters.
  operationId: csResendRFQ
  tags:
    - CS Operations
  parameters:
    - name: rfq_number
      in: path
      description: RFQ number identifier
      required: true
      example: RFQ0000932
      schema:
        type: string
        pattern: ^RFQ[0-9BKG]{8,9}$
        example: RFQ20240001
    - name: vendor_batch
      in: path
      description: |
        Vendor batch number (1 or 2 for dual-vendor RFQs).

        **Important**: In dual-vendor scenarios:
        - Batch 1: Primary vendor
        - Batch 2: Secondary vendor (only processed if Batch 1 declined)
      required: true
      example: 1
      schema:
        type: integer
        minimum: 1
        maximum: 2
        example: 1
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties: {}
        example: ''
  responses:
    '200':
      description: RFQ resent successfully
      content:
        application/json:
          schema:
            type: object
            properties: {}
      headers: {}
  security:
    - bearer: []
