post:
  summary: Generate JWT token (backdoor)
  deprecated: false
  description: |
    **Backdoor endpoint** - No authentication required.

    Generate a JWT token for testing purposes.
  operationId: generateToken
  tags:
    - Purchase Requests
  parameters: []
  requestBody:
    content:
      application/json:
        schema:
          type: object
          description: Token payload
          properties: {}
        example:
          rfq_number: RFQ0000628
          type: vendor
          vendor_code: '100415'
          vendor_batch: 2
          expiresIn: 7d
  responses:
    '200':
      description: Token generated successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: object
                properties:
                  token:
                    type: string
      headers: {}
  security:
    - bearer: []
