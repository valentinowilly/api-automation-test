post:
  summary: Send RFQ to QCF
  deprecated: false
  description: |
    Create Quotation Comparison Form (QCF) from approved RFQ items.

    Sends email notification to CL for final approval.

    After CL approval, items proceed to SAP Auto PO synchronization.
  operationId: sendToQCF
  tags:
    - CS Operations
  parameters:
    - name: rfq_number
      in: path
      description: RFQ number identifier
      required: true
      example: ''
      schema:
        type: string
        pattern: ^RFQ[0-9BKG]{8,9}$
        example: RFQ20240001
    - name: vendor_batch
      in: path
      description: |
        Vendor batch number (1 or 2 for dual-vendor RFQs).

        **Important**: In dual-vendor scenarios:
        - Batch 1: Primary vendor
        - Batch 2: Secondary vendor (only processed if Batch 1 declined)
      required: true
      example: 0
      schema:
        type: integer
        minimum: 1
        maximum: 2
        example: 1
  requestBody:
    content:
      application/json:
        schema:
          type: object
          required:
            - items
            - rfq_tipe
          properties:
            items:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: integer
            rfq_tipe:
              type: string
          example:
            items:
              - id: 123
              - id: 124
            rfq_tipe: standard
    required: true
  responses:
    '200':
      description: QCF created successfully
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
              data:
                type: object
                properties:
                  updated:
                    type: integer
      headers: {}
  security:
    - bearer: []
