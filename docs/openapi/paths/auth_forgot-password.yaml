post:
  summary: Request password reset
  deprecated: false
  description: |
    Initiate password reset process by sending reset link to user's email.
  operationId: forgotPassword
  tags:
    - Authentication/Old method (Deprecated)
    - Authentication
  parameters: []
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties: {}
        example:
          email: user@example.com
    required: true
  responses:
    '200':
      description: Password reset email sent
      content:
        application/json:
          schema:
            type: object
            properties: {}
          example:
            message: Password reset email sent
            data:
              success: true
      headers: {}
  security:
    - bearer: []
