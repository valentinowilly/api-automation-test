  /pr/cs/declined_items/token/{token}:
    get:
      summary: Get declined RFQ items by Token
      deprecated: false
      description: |
        Retrieve RFQ items declined by vendor (status_vendor = 2).
      operationId: getDeclinedItemsByToken
      tags:
        - CS Operations
      parameters:
        - name: token
          in: path
          description: ''
          required: true
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJyZnFfbnVtYmVyIjoiUkZRMDAwMDYyNiIsInZlbmRvcl9iYXRjaCI6MiwiaWF0IjoxNzY5NTAxMTc1LCJleHAiOjE3NzAxMDU5NzV9.qiR26w8jixhXCMg4ax8wifKPbeZessx8iuCr1VH8Za4
          schema:
            type: string
      responses:
        '200':
          description: Declined items retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties: {}
          headers: {}
      security:
        - bearer: []
  /pr/cs/price_not_match/{rfq_number}/{vendor_batch}:
    get:
      summary: Get items with price mismatch
      deprecated: false
      description: |
        Retrieve RFQ items where vendor price exceeds OE (item_value) threshold.
      operationId: getPriceNotMatch
      tags:
        - CS Operations
      parameters:
        - name: rfq_number
          in: path
          description: RFQ number identifier
          required: true
          example: RFQ0000589
          schema:
            type: string
            pattern: ^RFQ[0-9BKG]{8,9}$
            example: RFQ20240001
        - name: vendor_batch
          in: path
          description: |
            Vendor batch number (1 or 2 for dual-vendor RFQs).

            **Important**: In dual-vendor scenarios:
            - Batch 1: Primary vendor
            - Batch 2: Secondary vendor (only processed if Batch 1 declined)
          required: true
          example: 2
          schema:
            type: integer
            minimum: 1
            maximum: 2
            example: 1
      responses:
        '200':
          description: Price mismatch items retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      header:
                        type: object
                        properties:
                          rfq_number:
                            type: string
                          pr_number:
                            type: string
                          purchasing_group:
                            type: string
                          pr_creator_name:
                            type: string
                          pr_creator_email:
                            type: string
                          pr_release_date:
                            type: string
                          sla_days:
                            type: integer
                          vendor_code:
                            type: string
                          vendor_name:
                            type: string
                          milestone:
                            type: string
                          sub_milestone:
                            type: string
                          quotation_number:
                            type: string
                            nullable: true
