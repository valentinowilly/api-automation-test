        '200':
          description: Mock RFQ deleted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
              example:
                message: Mock RFQ deleted successfully
                data:
                  rfq_number: RFQ0000042
                  deleted_items: 5
                  deleted_vendors: 3
        '400':
          description: Invalid RFQ number format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Invalid RFQ number format
                data: null
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: RFQ not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: RFQ not found
                data: null
        '500':
          description: Internal server error during deletion
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Failed to delete mock RFQ
                data: null
