  /pr/listQCF:
    get:
      summary: List QCFs
      deprecated: false
      description: |
        Retrieve list of Quotation Comparison Forms for CL user with pagination.
      operationId: listQCF
      tags:
        - QCF Management
      parameters:
        - name: page
          in: query
          description: ''
          required: false
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          description: ''
          required: false
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: QCFs retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties: {}
          headers: {}
      security:
        - bearer: []
  /pr/rfq/handle-expired-management-review:
    post:
      tags:
        - Cron Jobs & Manual Triggers
      summary: Handle expired management review RFQs
      description: |
        Manually trigger the cron job that handles RFQs where management review has expired. This endpoint automatically processes RFQs that have exceeded their management review deadline and performs necessary status updates and notifications.
        **Note**: This is normally executed by the cron scheduler but can be manually triggered for testing or recovery purposes.
      operationId: handleExpiredManagementReview
      security:
        - bearer: []
      responses:
        '200':
          description: Successfully processed expired management reviews
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
              example:
                message: Expired management reviews processed successfully
                data:
                  processed_count: 5
                  rfq_numbers:
                    - RFQ0000042
                    - RFQ0000043
                    - RFQ0000044
        '401':
          description: Unauthorized - invalid or missing JWT token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error during processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Failed to process expired management reviews
                data: null
  /pr/rfq/send-3-day-reminders:
    post:
      summary: Send 3-day pending RFQ reminders
      deprecated: false
      description: |
        **Cron Job / Manual Trigger**

        Send reminder emails for RFQs pending for 3 days.

        **Logic**: For dual-vendor RFQs where Vendor 1 hasn't responded:
        - Duplicates RFQ for Vendor 2
        - Sends RFQ email to Vendor 2

        **Execution**: Can be triggered manually or via cron schedule.
      operationId: send3DayReminders
      tags:
        - Cron Jobs & Manual Triggers
      parameters: []
      responses:
        '200':
          description: Reminders processed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      processed:
                        type: integer
                      emails_sent:
                        type: integer
          headers: {}
      security:
        - bearer: []
  /pr/rfq/send-6-day-reminders:
    post:
      summary: Send 6-day dual vendor pending RFQ reminders
      deprecated: false
      description: |
        **Cron Job / Manual Trigger**

        Send reminder emails for RFQs pending for 6 days.

        **Logic**: Groups RFQs by vendor and sends "quotation not yet submitted" emails.

