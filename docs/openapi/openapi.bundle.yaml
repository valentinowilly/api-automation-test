  /pr/cl/approve_items/{rfq_number}/{vendor_batch}:
    put:
      summary: CL approve RFQ items
      deprecated: false
      description: |
        Category Lead approves RFQ items (surrogate, revisi_oe, etc.).
      operationId: clApproveItems
      tags:
        - CL Operations
      parameters:
        - name: rfq_number
          in: path
          description: RFQ number identifier
          required: true
          example: ''
          schema:
            type: string
            pattern: ^RFQ[0-9BKG]{8,9}$
            example: RFQ20240001
        - name: vendor_batch
          in: path
          description: |
            Vendor batch number (1 or 2 for dual-vendor RFQs).

            **Important**: In dual-vendor scenarios:
            - Batch 1: Primary vendor
            - Batch 2: Secondary vendor (only processed if Batch 1 declined)
          required: true
          example: 0
          schema:
            type: integer
            minimum: 1
            maximum: 2
            example: 1
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: {}
      responses:
        '200':
          description: Items approved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      updated:
                        type: integer
          headers: {}
      security:
        - bearer: []
  /pr/cl/approve_qcf/{qcf_number}:
    put:
      summary: CL approve QCF
      deprecated: false
      description: |
        Category Lead approves Quotation Comparison Form.

        **Important**: After approval:
        - Items marked as approved (qcf_approved = true)
        - Vendor status updates sent
        - SAP Auto PO synchronization triggered
      operationId: clApproveQCF
      tags:
        - CL Operations
      parameters:
        - name: qcf_number
          in: path
          description: QCF number identifier
          required: true
          example: QCF0000004
          schema:
            type: string
            maxLength: 20
            example: QCF20240001
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: {}
            example:
              cl_comment: Approved with 15% cost saving
      responses:
        '200':
          description: QCF approved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      updated:
                        type: integer
          headers: {}
      security:
        - bearer: []
