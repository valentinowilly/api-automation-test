  /pr/cs/send_surrogate/{rfq_number}/{vendor_batch}:
    post:
      summary: Send surrogate action
      deprecated: false
      description: |
        Assign surrogate vendor to RFQ items.

        **Action**: rfq_tipe = 'surrogate'

        Sends email notification to CL for approval.
      operationId: sendSurrogate
      tags:
        - CS Operations
      parameters:
        - name: rfq_number
          in: path
          description: RFQ number identifier
          required: true
          example: ''
          schema:
            type: string
            pattern: ^RFQ[0-9BKG]{8,9}$
            example: RFQ20240001
        - name: vendor_batch
          in: path
          description: |
            Vendor batch number (1 or 2 for dual-vendor RFQs).

            **Important**: In dual-vendor scenarios:
            - Batch 1: Primary vendor
            - Batch 2: Secondary vendor (only processed if Batch 1 declined)
          required: true
          example: 0
          schema:
            type: integer
            minimum: 1
            maximum: 2
            example: 1
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: {}
            example:
              items:
                - id: 123
              rfq_tipe: surrogate
        required: true
      responses:
        '200':
          description: Surrogate action sent successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      updated:
                        type: integer
                      rfq_number:
                        type: string
                      vendor_batch:
                        type: integer
          headers: {}
      security:
        - bearer: []
