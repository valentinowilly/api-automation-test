  /pr/cl/need_approval_items/{rfq_number}/{vendor_batch}:
    get:
      summary: Get RFQ items needing CL approval
      deprecated: false
      description: |
        Retrieve RFQ items that require Category Lead approval.

        Typically items with surrogate, revisi_oe, or special actions.
      operationId: getNeedApprovalItems
      tags:
        - CL Operations
      parameters:
        - name: rfq_number
          in: path
          description: RFQ number identifier
          required: true
          example: ''
          schema:
            type: string
            pattern: ^RFQ[0-9BKG]{8,9}$
            example: RFQ20240001
        - name: vendor_batch
          in: path
          description: |
            Vendor batch number (1 or 2 for dual-vendor RFQs).

            **Important**: In dual-vendor scenarios:
            - Batch 1: Primary vendor
            - Batch 2: Secondary vendor (only processed if Batch 1 declined)
          required: true
          example: 0
          schema:
            type: integer
            minimum: 1
            maximum: 2
            example: 1
      responses:
        '200':
          description: Items needing approval retrieved successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: array
                    items:
                      type: object
                      properties: {}
          headers: {}
      security:
        - bearer: []
