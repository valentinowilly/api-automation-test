          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties: {}
          headers: {}
      security:
        - bearer: []
  /pr/rfq/notify-single-submission/{days}:
    post:
      summary: Notify for single submission deadline
      deprecated: false
      description: |
        **Cron Job / Manual Trigger**

        Notify for single vendor submission at N days (optional parameter).

        **Logic**: For RFQs with only one vendor submitted:
        - Generates DIC token
        - Sends DIC confirmation request

        **Days Parameter**: Optional, defaults to configured value.
      operationId: notifySingleSubmission
      tags:
        - Cron Jobs & Manual Triggers
      parameters:
        - name: days
          in: path
          description: Number of days threshold (optional)
          required: false
          example: 3
          schema:
            type: integer
            example: 6
      responses:
        '200':
          description: Notifications processed successfully
          content:
            application/json:
              schema:
                type: object
                properties: {}
          headers: {}
      security:
        - bearer: []
  /pr/rfq/handle-9-day-follow-up:
    post:
      summary: Handle 9-day dual-vendor RFQ follow-up
      deprecated: false
      description: |
        **Cron Job / Manual Trigger**

        Handle RFQs with dual vendors pending for 9 days.

