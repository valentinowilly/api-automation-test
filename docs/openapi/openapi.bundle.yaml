components:
  schemas:
    StandardResponse:
      type: object
      required:
        - message
        - data
      properties:
        message:
          type: string
          description: Success or informational message
          example: Operation completed successfully
        data:
          description: Response payload containing requested data
          example: {}
    PaginatedResponse:
      allOf:
        - $ref: '#/components/schemas/StandardResponse'
        - type: object
          properties:
            pagination:
              type: object
              required:
                - totalItems
                - totalPages
                - currentPage
                - itemsPerPage
              properties:
                totalItems:
                  type: integer
                  description: Total number of items across all pages
                  example: 150
                totalPages:
                  type: integer
                  description: Total number of pages
                  example: 15
                currentPage:
                  type: integer
                  description: Current page number (1-indexed)
                  example: 1
                itemsPerPage:
                  type: integer
                  description: Number of items per page
                  example: 10
    ErrorResponse:
      type: object
      required:
        - message
        - data
      properties:
        message:
          oneOf:
            - type: string
              description: Single error message
              example: User not found
            - type: array
              description: Array of validation error messages (from Joi validation)
              items:
                type: string
              example:
                - '"email" must be a valid email'
                - '"name" length must be at least 3 characters long'
          description: Error message - can be a single string for general errors or an array of strings for validation errors
        data:
          type: object
          nullable: true
          description: Always null for error responses
          example: null
    BaseModel:
      type: object
      properties:
        id:
          type: number
        created_at:
          type: string
        updated_at:
          type: string
      required:
        - id
        - created_at
        - updated_at
    PaginationMeta:
      type: object
      properties:
        totalItems:
          type: integer
        totalPages:
          type: integer
        currentPage:
          type: integer
        itemsPerPage:
          type: integer
      required:
        - totalItems
        - totalPages
        - currentPage
        - itemsPerPage
    Permission:
      type: object
      properties:
        id:
          type: number
        created_at:
          type: string
        updated_at:
          type: string
        name:
          type: string
        slug:
          type: string
      required:
        - name
        - slug
        - id
        - created_at
        - updated_at
    Role:
      type: object
      properties:
        id:
          type: number
        created_at:
          type: string
        updated_at:
          type: string
        name:
          type: string
        slug:
          type: string
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/Permission'
      required:
        - name
        - slug
        - permissions
        - id
        - created_at
        - updated_at
  responses:
    BadRequest:
      description: Bad request - validation error or invalid parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            validation_error:
              summary: Validation error with multiple messages
              value:
                message:
                  - '"email" must be a valid email'
                  - '"name" length must be at least 3 characters long'
                data: null
            general_error:
              summary: General bad request error
              value:
                message: Invalid request parameters
                data: null
    Unauthorized:
      description: Unauthorized - invalid or missing authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: Unauthorized access
            data: null
    Forbidden:
      description: Forbidden - insufficient permissions or expired token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: Access forbidden
            data: null
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: Resource not found
            data: null
    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            message: Internal server error occurred
            data: null
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
      description: JWT token for dashboard users (CS/CL/DIC/Admin roles). Obtained via `/auth/login/basic` or `/auth/login/oauth/google` endpoints.
    emailToken:
      type: http
      scheme: bearer
      description: JWT token for vendors and DIC users via email links. Tokens are embedded in email notifications and validated against business day expiry (excludes weekends). Note that some endpoints accept this token as a path parameter instead of in the Authorization header.
