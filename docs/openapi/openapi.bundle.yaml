openapi: 3.0.1
info:
  title: AIGEN Backend API
  description: |
    Procurement System Backend API for managing Purchase Requests (PR), Request for Quotations (RFQ), and Quotation Comparison Forms (QCF).
    This system integrates with SAP and handles vendor quotation workflows through automated email notifications and cron jobs.
    ## Authentication
    The API uses two authentication mechanisms:
    1. **BearerAuth**: JWT token for dashboard users (CS/CL/DIC/Admin roles)
       - Header: `Authorization: Bearer <token>`
       - Obtained via `/auth/login` endpoint

    2. **EmailTokenAuth**: JWT token for vendors and DIC users via email links
       - Header: `Authorization: Bearer <token>` or token in URL path parameters
       - Tokens are embedded in email notifications

    ## Workflow Overview
    The procurement workflow follows these stages: 1. Purchase Request (PR) creation 2. RFQ generation and vendor notification 3. Vendor quotation submission 4. DIC confirmation 5. CS/CL approval 6. QCF generation 7. SAP Auto PO synchronization
    ## Base URL
    Local development: `http://localhost:3000`
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local development
security:
  - bearer: []
tags:
  - name: Health Check
    description: System health monitoring endpoints for load balancers and monitoring tools
  - name: Authentication
    description: User authentication, login, and session management
  - name: Authentication/New method
    description: New authentication endpoints using improved security patterns
  - name: Authentication/Reset Password new
    description: New password reset flow with enhanced security
  - name: Authentication/Old method (Deprecated)
    description: Legacy authentication endpoints - deprecated, use new methods instead
  - name: Auto PO Configuration
    description: Configuration management for SAP Auto PO synchronization settings
  - name: Email Notifications
    description: Email notification sending and resending operations for RFQ workflows
  - name: Purchase Requests
    description: Purchase Request (PR) and Request for Quotation (RFQ) management
  - name: Vendor Operations
    description: Vendor quotation submission and RFQ item management
  - name: DIC Operations
    description: DIC (Division In Charge) confirmation and approval workflows
  - name: CS Operations
    description: CS (Central Sourcing) review, approval, and workflow management
  - name: CL Operations
    description: CL (Cost Leader) approval and QCF review operations
  - name: Management Operations
    description: Management-level QCF approval and oversight functions
  - name: Admin Endpoints
    description: Administrative operations for RFQ and QCF management
  - name: QCF Management
    description: Quotation Comparison Form (QCF) operations and workflows
  - name: Cron Jobs & Manual Triggers
    description: Automated job endpoints that can be manually triggered for testing or recovery
  - name: Upload Management
    description: File upload and deletion operations for documents, images, and evidence
  - name: Access Control List (ACL)
    description: Role-based access control management for users and permissions
  - name: Access Control List (ACL)/Roles
    description: Role CRUD operations for access control
  - name: Access Control List (ACL)/Permissions
    description: Permission CRUD operations for access control
  - name: Endpoint generate data for testing
    description: Test data generation endpoints for development and QA environments
  - name: Mock
    description: Mock data creation endpoints for testing RFQ workflows and scenarios
  - name: Sourcing Reason
    description: Sourcing reason configuration and management
  - name: Master Data
    description: Master data management for users, vendors, categories, and configurations
  - name: Master Data/Users
    description: User management and configuration
  - name: Master Data/User Matrices
    description: User matrix configuration for approval workflows
  - name: Master Data/Divisions
    description: Division master data management
  - name: Master Data/Material Hierarchy
    description: Material hierarchy and categorization management
  - name: Master Data/Categories
    description: Category master data and level management
  - name: Master Data/Vendor
    description: Vendor master data management
  - name: Master Data/Material Assignment
    description: Material assignment to categories and hierarchies
  - name: Master Data/Matrix category
    description: Category matrix configuration for approval routing
  - name: Dashboard
    description: Role-specific dashboard data for CS, CL, vendors, and management
  - name: Dashboard/Admin
    description: Administrative dashboard data for RFQ and QCF oversight
paths:
  /health:
    get:
      tags:
        - Health Check
      summary: Health check endpoint
      description: |
        Returns the health status of the API server. This endpoint is unprotected and can be used for monitoring and load balancer health checks.
      operationId: getHealth
      responses:
        '200':
          description: Server is healthy and running
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      message:
                        type: string
                        example: API is healthy
                      data:
                        type: object
                        example: {}
              example:
                message: API is healthy
                data: {}
        '500':
          description: Server health check failed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      message:
                        type: string
                        example: API health check failed
                      data:
                        type: object
                        example: {}
              example:
                message: API health check failed
                data: {}
  /auth/login/basic:
    post:
      summary: Basic Login
      deprecated: false
      description: Authenticate user with email/username and password. Returns a JWT access token for subsequent API requests.
      tags:
        - Authentication/New method
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - identifier
                - password
              properties:
                identifier:
                  type: string
                  description: User email or username
                  example: procurement@sinarmasmining.com
                password:
                  type: string
                  format: password
                  description: User password
                  example: 1Cz3DPsVmwAS7FawsKT1pFkJXZsAGbto
        required: true
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
                        description: JWT access token
                    required:
                      - access_token
                required:
                  - message
                  - data
              example:
                message: Login Berhasil
                data:
                  access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJkYXRhIjp7ImVtYWlsIjoicHJvY3VyZW1lbnRAc2luYXJtYXNtaW5pbmcuY29tIiwibGV2ZWwiOm51bGwsInJvbGUiOm51bGwsInBlcm1pc3Npb25zIjpbXSwidXNlcl9pZCI6MSwidXNlcm5hbWUiOiIifSwiaWF0IjoxNzcwODAwMTMzLCJleHAiOjE3NzA5NzI5MzN9.6ltuupjRSllCFWCFJrBsUWWdJAQ_0jX_7Kr9uMh1YfE
          headers: {}
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Invalid email or password
                data: null
        '500':
          $ref: '#/components/responses/InternalServerError'
      security: []
  /auth/me:
    get:
      summary: Get Current User Profile
      deprecated: false
      description: Retrieve the authenticated user's profile information including available roles and permissions.
      tags:
        - Authentication/New method
      parameters: []
      responses:
        '200':
          description: Successfully retrieved current user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      current_user:
                        type: object
                        properties:
                          id:
                            type: integer
                          name:
                            type: string
                          email:
                            type: string
                          type:
                            type: object
                            properties:
                              value:
                                type: integer
                                description: Numeric user type (1=INTERNAL, 2=VENDOR)
                              label:
                                type: string
                                enum:
                                  - INTERNAL
                                  - VENDOR
                                description: Human-readable user type label
                            required:
                              - value
                              - label
                          asigned_by:
                            type: integer
                          created_at:
                            type: string
                            format: date-time
                          updated_at:
                            type: string
                            format: date-time
                          deleted_at:
                            type: string
                            format: date-time
                            nullable: true
                        required:
                          - id
                          - name
                          - email
                          - type
                          - asigned_by
                          - created_at
                          - updated_at
                      available_roles:
                        type: array
                        items:
                          type: string
                        description: Array of role slugs available to the user
                        example:
                          - admin
                          - category-specialist
                      available_vendor_codes:
                        type: array
                        items:
                          type: string
                        description: Array of vendor codes for vendor-type users (empty for internal users)
                        example: []
                    required:
                      - current_user
                      - available_roles
                      - available_vendor_codes
                required:
                  - message
                  - data
              example:
                message: Profile Berhasil
                data:
                  current_user:
                    id: 1
                    name: Admin Procurement
                    email: procurement@sinarmasmining.com
                    type:
                      value: 1
                      label: INTERNAL
                    asigned_by: 0
                    created_at: '2026-03-05T10:46:05.000Z'
                    updated_at: '2026-03-05T10:46:05.000Z'
                    deleted_at: null
                  available_roles:
                    - admin
                    - category-specialist
                  available_vendor_codes: []
          headers: {}
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - bearer: []
  /auth/switch-role:
    put:
      summary: Switch Role
      deprecated: false
      description: Switch the authenticated user's active role and receive a new access token with updated permissions
      tags:
        - Authentication/New method
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - role_id
              properties:
                role_id:
                  type: integer
                  description: ID of the role to switch to
                  example: 1
            example:
              role_id: 1
      responses:
        '200':
          description: ''
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
                    required:
                      - access_token
                required:
                  - message
                  - data
              example:
                message: Switch Role Berhasil
                data:
                  access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..JQpgRKqlx4_QHRcBHn6e14peA77cVUXzzFGbEl2z2eU
          headers: {}
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - bearer: []
  /auth/login/oauth/google:
    get:
      summary: Get Google OAuth URL
      deprecated: false
      description: Generate Google OAuth2 authorization URL for initiating the login flow. This is a public endpoint.
      tags:
        - Authentication/New method
      parameters:
        - name: state
          in: query
          description: Optional state parameter for CSRF protection
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Successfully generated OAuth URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      url:
                        type: string
                        description: Google OAuth2 authorization URL
                    required:
                      - url
                required:
                  - message
                  - data
              example:
                message: Login Berhasil
                data:
                  url: https://accounts.google.com/o/oauth2/v2/auth?client_id=229765958753-vj9dk2gbo9lbgd6spn8btmcai9c6cr4m.apps.googleusercontent.com&response_type=code&redirect_uri=https%3A%2F%2Fsinarmas-aigen-dev.devnstg.com%2Fsso%2Fcallback.html&scope=openid+profile+email&access_type=offline&prompt=consent
          headers: {}
      security: []
    post:
      summary: Authenticate with Google OAuth
      deprecated: false
      description: Complete Google OAuth authentication by exchanging authorization code for access token, or directly using an access token. This is a public endpoint.
      tags:
        - Authentication/New method
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                authorization_code:
                  type: string
                  description: Authorization code from Google OAuth callback
                  example: 4/0AfrIepAOtuBlkq05BXfdTP8kmbEOx0zZXhGr4yqbBZg0UBadQ495O5qqulJnZ7NjlQtt_w
                access_token:
                  type: string
                  description: Google access token (alternative to authorization_code for advanced flows)
              oneOf:
                - required:
                    - authorization_code
                - required:
                    - access_token
            example:
              authorization_code: 4/0AfrIepAOtuBlkq05BXfdTP8kmbEOx0zZXhGr4yqbBZg0UBadQ495O5qqulJnZ7NjlQtt_w
      responses:
        '200':
          description: Successfully authenticated with Google OAuth
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      access_token:
                        type: string
                        description: JWT access token for API authentication
                    required:
                      - access_token
                required:
                  - message
                  - data
              example:
                message: Login Berhasil
                data:
                  access_token: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJkYXRhIjp7ImVtYWlsIjoieXVzcmlsYWRyLjM3QGdtYWlsLmNvbSIsImxldmVsIjpudWxsLCJyb2xlIjpudWxsLCJwZXJtaXNzaW9ucyI6W10sInVzZXJfaWQiOjM3NiwidXNlcm5hbWUiOiJ5dXNyaWwtYWRyIn0sImlhdCI6MTc3MTM4NDQwOCwiZXhwIjoxNzcxNTU3MjA4fQ.1MsrYCd5r5Mca2Dqi0wctYlMjYrMnuoiyEQTskb-6bI
          headers: {}
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security: []
  /auth/basic/forgot-password:
    post:
      summary: Request password reset
      deprecated: false
      description: |
        Initiate password reset process by sending reset link to user's email. This is a public endpoint that does not require authentication.
      operationId: forgotPasswordBasic
      tags:
        - Authentication/Reset Password new
        - Authentication
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
              properties:
                email:
                  type: string
                  format: email
                  description: User's registered email address
                  example: user@example.com
            example:
              email: user@example.com
      responses:
        '200':
          description: Password reset request processed (email sent if user exists)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/StandardResponse'
                  - type: object
                    properties:
                      message:
                        type: string
                        example: Jika email Anda terdaftar, tautan reset password akan dikirimkan.
                      data:
                        type: 'null'
                        example: null
              example:
                message: Jika email Anda terdaftar, tautan reset password akan dikirimkan.
                data: null
          headers: {}
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security: []
  /auth/basic/reset-password:
    post:
      summary: Reset password
      deprecated: false
      description: |
        Complete password reset with valid token and new password.

        Token is obtained from the password reset email.
      operationId: resetPasswordBasic
      tags:
        - Authentication/Reset Password new
        - Authentication
      parameters:
        - name: token
          in: query
          description: Password reset token from email
          required: true
          example: ''
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - newPassword
              properties:
                newPassword:
                  type: string
                  format: password
                  minLength: 8
                  description: New password for the account
            example:
              newPassword: newpassword123
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Password Anda berhasil direset. Silakan login dengan password baru.
                  data:
                    type: 'null'
                    example: null
              example:
                message: Password Anda berhasil direset. Silakan login dengan password baru.
                data: null
          headers: {}
        '400':
          description: Invalid token or password requirements not met
          content:
            application/json:
              schema:
                type: object
                properties: {}
              example:
                message: Password must be at least 8 characters
                data: error data
          headers: {}
      security: []
    get:
      summary: Reset password Verif Token
      deprecated: false
      description: |
        Complete password reset with valid token and new password.

        Token is obtained from the password reset email.
      operationId: verifyResetPassword
      tags:
        - Authentication/Reset Password new
        - Authentication
      parameters:
        - name: token
          in: query
          description: Password reset token from email
          required: true
          example: ''
          schema:
            type: string
      responses:
        '200':
          description: Token is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Token valid.
                  data:
                    type: 'null'
                    example: null
              example:
                message: Token valid.
                data: null
          headers: {}
        '400':
          description: Invalid token or token expired
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
              example:
                message: Invalid or expired token
                data: {}
          headers: {}
      security: []
  /auth/login:
    post:
      summary: User login
      deprecated: false
      description: |
        Authenticate user with email and password, returns JWT token and user details.

        Supports both dashboard users (CS/CL/DIC/Admin) with role-based access.

        Users may have multiple roles (e.g., both CS and CL).
      operationId: login
      tags:
        - Authentication/Old method (Deprecated)
        - Authentication
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: {}
            example:
              email: nicky.laksmana@sinarmasmining.com
              password: 1Cz3DPsVmwAS7FawsKT1pFkJXZsAGbto
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  data:
                    type: object
                    properties: {}
              example:
                message: Login Succesful
                data:
                  user_id: 1
                  name: CS User Name
                  email: cs.user@example.com
                  roles_id: 2
                  roles:
                    - roles_id: 2
                      level: cs
                  jwtToken: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
          headers: {}
      security:
        - bearer: []
  /auth/forgot-password:
    post:
      summary: Request password reset
      deprecated: false
      description: |
        Initiate password reset process by sending reset link to user's email.
      operationId: forgotPassword
      tags:
        - Authentication/Old method (Deprecated)
        - Authentication
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: {}
            example:
              email: user@example.com
        required: true
      responses:
        '200':
          description: Password reset email sent
          content:
            application/json:
              schema:
                type: object
                properties: {}
              example:
                message: Password reset email sent
                data:
                  success: true
          headers: {}
      security:
        - bearer: []
  /auth/reset-password:
    post:
      summary: Reset password
      deprecated: false
      description: |
        Complete password reset with valid token and new password.

        Token is obtained from the password reset email.
      operationId: resetPassword
      tags:
        - Authentication/Old method (Deprecated)
        - Authentication
      parameters:
        - name: token
          in: query
          description: Password reset token from email
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: {}
            example:
              newPassword: newpassword123
        required: true
      responses:
        '200':
          description: Password reset successful
          content:
            application/json:
              schema:
                type: object
                properties: {}
              example:
                message: Password reset successful
                data:
                  success: true
          headers: {}
        '400':
          description: Invalid token or password requirements not met
          content:
            application/json:
              schema:
                type: object
                properties: {}
              example:
                message: Password must be at least 8 characters
                data: error data
          headers: {}
      security:
        - bearer: []
