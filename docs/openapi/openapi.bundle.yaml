  /pr/cs/declined_items/{rfq_number}/{vendor_batch}:
    get:
      summary: Get declined RFQ items
      deprecated: false
      description: |
        Retrieve RFQ items declined by vendor (status_vendor = 2).
      operationId: getDeclinedItems
      tags:
        - CS Operations
      parameters:
        - name: rfq_number
          in: path
          description: RFQ number identifier
          required: true
          example: RFQ0000597
          schema:
            type: string
            pattern: ^RFQ[0-9BKG]{8,9}$
            example: RFQ20240001
        - name: vendor_batch
          in: path
          description: |
            Vendor batch number (1 or 2 for dual-vendor RFQs).

            **Important**: In dual-vendor scenarios:
            - Batch 1: Primary vendor
            - Batch 2: Secondary vendor (only processed if Batch 1 declined)
          required: true
          example: 2
          schema:
            type: integer
            minimum: 1
            maximum: 2
            example: 1
