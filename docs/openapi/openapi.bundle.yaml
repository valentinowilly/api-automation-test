  /mock/rfq/batch:
    post:
      tags:
        - Mock
      summary: Create multiple mock RFQs in batch
      description: |
        Creates multiple mock RFQ records in batch for testing purposes. This endpoint is useful for generating test data scenarios with predefined or random RFQ configurations.
        **Note**: This endpoint should only be used in development/testing environments.
      operationId: createMockRfqBatch
      security:
        - bearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - count
              properties:
                count:
                  type: integer
                  description: Number of mock RFQs to create
                  minimum: 1
                  maximum: 100
                  example: 10
                scenario:
                  type: string
                  description: Predefined scenario template (optional)
                  enum:
                    - pending_vendor
                    - pending_dic
                    - pending_cs
                    - pending_cl
                    - completed
                    - random
                  example: pending_vendor
                vendor_batch:
                  type: integer
                  description: Vendor batch number (optional, auto-generated if not provided)
                  example: 1
            example:
              count: 10
              scenario: pending_vendor
              vendor_batch: 1
      responses:
        '200':
          description: Mock RFQs created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
              example:
                message: Mock RFQs created successfully
                data:
                  created_count: 10
                  rfq_numbers:
                    - RFQ0000100
                    - RFQ0000101
                    - RFQ0000102
                    - RFQ0000103
                  scenario: pending_vendor
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                validation_error:
                  value:
                    message:
                      - '"count" must be between 1 and 100'
                    data: null
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Failed to create mock RFQs
                data: null
  /mock/rfq/templates:
    get:
      tags:
        - Mock
      summary: Get mock RFQ scenario templates
      description: |
        Retrieves a list of available predefined scenario templates for creating mock RFQs. Each template represents a different workflow state or testing scenario.
        **Note**: This endpoint should only be used in development/testing environments.
      operationId: getMockRfqTemplates
      security:
        - bearer: []
      responses:
        '200':
          description: Successfully retrieved scenario templates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardResponse'
              example:
                message: Mock RFQ templates retrieved successfully
                data:
                  templates:
                    - id: pending_vendor
                      name: Pending Vendor Submission
                      description: RFQs awaiting vendor quotation submission
                    - id: pending_dic
                      name: Pending DIC Confirmation
                      description: RFQs awaiting DIC confirmation
                    - id: pending_cs
                      name: Pending CS Approval
                      description: RFQs awaiting CS review and approval
                    - id: pending_cl
                      name: Pending CL Approval
                      description: RFQs awaiting CL approval
                    - id: completed
                      name: Completed RFQs
                      description: Fully completed RFQs ready for QCF
                    - id: random
                      name: Random Mix
                      description: Random assortment of different states
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: Failed to retrieve templates
                data: null
  /mock/rfq/{rfq_number}:
    delete:
      tags:
        - Mock
      summary: Delete mock RFQ by RFQ number
      description: |
        Deletes a specific mock RFQ and all associated data by its RFQ number. This endpoint is used to clean up test data after testing scenarios.
        **Note**: This endpoint should only be used in development/testing environments. Use with caution as it permanently deletes data.
      operationId: deleteMockRfq
      security:
        - bearer: []
      parameters:
        - name: rfq_number
          in: path
          required: true
