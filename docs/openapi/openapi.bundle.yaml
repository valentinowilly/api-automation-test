  /pr/vendor/submit_penawaran:
    put:
      summary: Vendor submit quotation
      deprecated: false
      description: |
        Process vendor quotation submission with comprehensive validation.

        **Validation Rules**:
        - Price validation via `maxPricevalidation()` (min/max percentage thresholds)
        - For accepted items: quotation_number, vendor_description, vendor_delivery_date required
        - For rejected items: vendor_reject_reason required

        **Dual-Vendor Logic**:
        - Vendor 2 items only processed if Vendor 1 declined for that specific item

        **Response Data**:
        - processedItems: Successfully submitted items
        - rejectedForPrice: Items rejected due to price validation
        - dicLink: DIC confirmation link (if submission complete)
        - token: Generated DIC token

        After successful submission, sends email notification to DIC for confirmation.
      operationId: vendorSubmitQuotation
      tags:
        - Vendor Operations
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties: {}
            example: |-
              {
                  "items": [
                      {
                          "id": 1824,
                          "status_vendor": 1,
                          "vendor_price": 150000,
                          "quotation_number": "QUO2024001",
