    Forbidden:
      $ref: components/responses/ErrorResponses.yaml#/Forbidden
    NotFound:
      $ref: components/responses/ErrorResponses.yaml#/NotFound
    InternalServerError:
      $ref: components/responses/ErrorResponses.yaml#/InternalServerError
  securitySchemes:
    bearer:
      type: http
      scheme: bearer
      description: JWT token for dashboard users (CS/CL/DIC/Admin roles). Obtained via `/auth/login/basic` or `/auth/login/oauth/google` endpoints.
    emailToken:
      type: http
      scheme: bearer
      description: JWT token for vendors and DIC users via email links. Tokens are embedded in email notifications and validated against business day expiry (excludes weekends). Note that some endpoints accept this token as a path parameter instead of in the Authorization header.
