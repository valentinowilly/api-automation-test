openapi: 3.0.1
info:
  title: AIGEN Backend API
  description: >
    Procurement System Backend API for managing Purchase Requests (PR),
    Request for Quotations (RFQ), and Quotation Comparison Forms (QCF).

    This system integrates with SAP and handles vendor quotation workflows through
    automated email notifications and cron jobs.

    ## Authentication

    The API uses two authentication mechanisms:

    1. **BearerAuth**: JWT token for dashboard users (CS/CL/DIC/Admin roles)
       - Header: `Authorization: Bearer <token>`
       - Obtained via `/auth/login` endpoint

    2. **EmailTokenAuth**: JWT token for vendors and DIC users via email links
       - Header: `Authorization: Bearer <token>` or token in URL path parameters
       - Tokens are embedded in email notifications

    ## Workflow Overview

    The procurement workflow follows these stages:
    1. Purchase Request (PR) creation
    2. RFQ generation and vendor notification
    3. Vendor quotation submission
    4. DIC confirmation
    5. CS/CL approval
    6. QCF generation
    7. SAP Auto PO synchronization

    ## Base URL

    Local development: `http://localhost:3000`
  version: 1.0.0
servers:
  - url: http://localhost:3000
    description: Local development
security:
  - bearer: []
