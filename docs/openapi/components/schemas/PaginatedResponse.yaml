allOf:
  - $ref: './StandardResponse.yaml'
  - type: object
    properties:
      pagination:
        type: object
        required:
          - totalItems
          - totalPages
          - currentPage
          - itemsPerPage
        properties:
          totalItems:
            type: integer
            description: Total number of items across all pages
            example: 150
          totalPages:
            type: integer
            description: Total number of pages
            example: 15
          currentPage:
            type: integer
            description: Current page number (1-indexed)
            example: 1
          itemsPerPage:
            type: integer
            description: Number of items per page
            example: 10
