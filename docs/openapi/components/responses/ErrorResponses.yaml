BadRequest:
  description: Bad request - validation error or invalid parameters
  content:
    application/json:
      schema:
        $ref: '../schemas/ErrorResponse.yaml'
      examples:
        validation_error:
          summary: Validation error with multiple messages
          value:
            message:
              - "\"email\" must be a valid email"
              - "\"name\" length must be at least 3 characters long"
            data: null
        general_error:
          summary: General bad request error
          value:
            message: "Invalid request parameters"
            data: null

Unauthorized:
  description: Unauthorized - invalid or missing authentication token
  content:
    application/json:
      schema:
        $ref: '../schemas/ErrorResponse.yaml'
      example:
        message: "Unauthorized access"
        data: null

Forbidden:
  description: Forbidden - insufficient permissions or expired token
  content:
    application/json:
      schema:
        $ref: '../schemas/ErrorResponse.yaml'
      example:
        message: "Access forbidden"
        data: null

NotFound:
  description: Resource not found
  content:
    application/json:
      schema:
        $ref: '../schemas/ErrorResponse.yaml'
      example:
        message: "Resource not found"
        data: null

InternalServerError:
  description: Internal server error
  content:
    application/json:
      schema:
        $ref: '../schemas/ErrorResponse.yaml'
      example:
        message: "Internal server error occurred"
        data: null
